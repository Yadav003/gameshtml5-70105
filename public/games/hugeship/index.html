			user-select: none;
			display: flex;
			align-items: center;
			justify-content: center;
			touch-action: none;
		}

			transform: scale(0.95);
		}

			height: 45px;

		#btn-down {

			left: 50%;
			transform: translateX(-50%);
			width: 45px;
			height: 45px;
		}

		#btn-left {

			height: 45px;
		}

		#btn-right {

			transform: translateY(-50%);

			height: 45px;
		}

			height: 40px;
			background: rgba(100, 100, 100, 0.3);
			border-radius: 50%;
		}

function setupMobileControls() {
    const canvas = document.getElementById('c2canvas');
    const runtime = (typeof cr_getC2Runtime === "function") ? cr_getC2Runtime() : null;
    const mobileControls = document.getElementById('mobile-controls');
    if (!mobileControls) return;

    // Ensure controls can receive touch
    mobileControls.style.pointerEvents = "auto";

    function simulateKeyPress(keyCode, type) {
        // Method 1: If Construct runtime exposes trigger functions
        if (runtime && runtime.triggerKeyDown && runtime.triggerKeyUp) {
            if (type === 'keydown') runtime.triggerKeyDown(keyCode);
            else runtime.triggerKeyUp(keyCode);
        } else {
            // Method 2: Dispatch synthetic event as fallback
            const event = new KeyboardEvent(type, {
                keyCode: keyCode,
                which: keyCode,
                bubbles: true,
                cancelable: true
            });
            document.dispatchEvent(event);
        }
    }

    function simulateAttack() {
        const rect = canvas.getBoundingClientRect();
        const x = rect.left + rect.width / 2;
        const y = rect.top + rect.height / 2;
        const eDown = new MouseEvent('mousedown', {clientX: x, clientY: y, bubbles: true});
        const eUp = new MouseEvent('mouseup', {clientX: x, clientY: y, bubbles: true});
        canvas.dispatchEvent(eDown);
        setTimeout(() => canvas.dispatchEvent(eUp), 120);
    }

    const controls = {
        'btn-up': [38, 87],   // Up/W
        'btn-down': [40, 83], // Down/S
        'btn-left': [37, 65], // Left/A
        'btn-right': [39, 68],// Right/D
        'btn-attack': [32]    // Space
    };

    Object.keys(controls).forEach(id => {
        const btn = document.getElementById(id);
        if (!btn) return;
        const keyCodes = controls[id];
        let isPressed = false;

        const press = e => {
            e.preventDefault();
            if (isPressed) return;
            isPressed = true;
            if (id === 'btn-attack') simulateAttack();
            else keyCodes.forEach(k => simulateKeyPress(k, 'keydown'));
        };

        const release = e => {
            e.preventDefault();
            if (!isPressed) return;
            isPressed = false;
            if (id !== 'btn-attack') keyCodes.forEach(k => simulateKeyPress(k, 'keyup'));
        };

        btn.addEventListener('touchstart', press, {passive:false});
        btn.addEventListener('touchend', release, {passive:false});
        btn.addEventListener('touchcancel', release, {passive:false});
        btn.addEventListener('mousedown', press);
        btn.addEventListener('mouseup', release);
        btn.addEventListener('mouseleave', release);
    });

    console.log("✅ Mobile controls initialized");
}
		// Pause and resume on page becoming visible/invisible
		function onVisibilityChanged() {
			if (document.hidden || document.mozHidden || document.webkitHidden || document.msHidden)
				cr_setSuspended(true);
			else
				cr_setSuspended(false);
		};
		
		document.addEventListener("visibilitychange", onVisibilityChanged, false);
		document.addEventListener("mozvisibilitychange", onVisibilityChanged, false);
		document.addEventListener("webkitvisibilitychange", onVisibilityChanged, false);
		document.addEventListener("msvisibilitychange", onVisibilityChanged, false);
		
		function OnRegisterSWError(e)
		{
			console.warn("Failed to register service worker: ", e);
		};
		
		// Runtime calls this global method when ready to start caching (i.e. after startup).
		// This registers the service worker which caches resources for offline support.
		window.C2_RegisterSW = function C2_RegisterSW()
		{
			if (!navigator.serviceWorker)
				return;		// no SW support, ignore call
			
			try {
				navigator.serviceWorker.register("sw.js", { scope: "./" })
				.then(function (reg)
				{
					console.log("Registered service worker on " + reg.scope);
				})
				.catch(OnRegisterSWError);
			}
			catch (e)
			{
				OnRegisterSWError(e);
			}
		};
